<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Analytics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">

    <div class="brand">
      <div class="brand-name">{{ title }}</div>
      <div class="brand-sub">Production Analytics &nbsp;v{{ version }}</div>
    </div>

    <div class="nav-segment">
      <a href="/"        class="nav-link {% if active=='dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/reports" class="nav-link {% if active=='reports'   %}active{% endif %}">Reports</a>
    </div>

    <span id="live-clock" style="font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:8px"></span>

    <button class="btn btn-danger btn-sm" style="margin-left:8px" onclick="confirmShutdown()">■ Stop</button>
  </div>
</nav>
<div class="refresh-wrap"><div class="refresh-bar" id="refresh-bar" style="width:100%"></div></div>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<script>
(function clock() {
  const el = document.getElementById('live-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-GB',
    {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setTimeout(clock, 1000);
})();

async function confirmShutdown() {
  if (!confirm('Stop the analytics server?')) return;
  try { await fetch('/shutdown', {method:'POST'}); } catch(e) {}
  document.body.style.cssText = 'background:#0d0d14;display:flex;align-items:center;justify-content:center;height:100vh;margin:0';
  document.body.innerHTML = `
    <div style="text-align:center;font-family:'JetBrains Mono','Courier New',monospace">
      <div style="color:#30D158;font-size:13px;margin-bottom:12px">
        [+] Server process terminated
      </div>
      <div style="color:rgba(226,226,240,0.35);font-size:11px">
        You can close this tab.
      </div>
    </div>`;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
