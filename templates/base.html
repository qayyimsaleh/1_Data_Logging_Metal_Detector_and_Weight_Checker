<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Analytics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">

    <!-- traffic lights -->
    <div class="tl-group">
      <span class="tl tl-red"    title="Stop Server" onclick="confirmShutdown()"></span>
      <span class="tl tl-yellow" title="Minimize"></span>
      <span class="tl tl-green"  title="Full Screen"></span>
    </div>

    <!-- brand -->
    <div class="brand">
      <div>{{ title }}</div>
      <div class="brand-sub">Production Analytics · v{{ version }}</div>
    </div>

    <!-- segment control -->
    <div class="nav-segment">
      <a href="/"        class="nav-link {% if active=='dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/reports" class="nav-link {% if active=='reports'   %}active{% endif %}">Reports</a>
    </div>

    <!-- live clock -->
    <span id="live-clock" style="font-size:12px;color:var(--text3);font-variant-numeric:tabular-nums;
          letter-spacing:.02em;margin-left:4px"></span>

  </div>
</nav>
<!-- refresh countdown bar -->
<div class="refresh-wrap"><div class="refresh-bar" id="refresh-bar" style="width:100%"></div></div>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<script>
// live clock
(function clock() {
  const el = document.getElementById('live-clock');
  if (el) {
    const now = new Date();
    el.textContent = now.toLocaleTimeString('en-GB', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  }
  setTimeout(clock, 1000);
})();

async function confirmShutdown() {
  if (!confirm('Stop the analytics server?')) return;
  try { await fetch('/shutdown', {method:'POST'}); } catch(e) {}
  document.body.style.background = '#000';
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;
                height:100vh;flex-direction:column;gap:16px">
      <div style="width:56px;height:56px;background:#FF5F57;border-radius:50%;
                  display:flex;align-items:center;justify-content:center;
                  font-size:24px;box-shadow:0 0 30px rgba(255,95,87,.4)">■</div>
      <h2 style="color:#fff;font-family:-apple-system,sans-serif;font-weight:700;
                 letter-spacing:-.02em">Server Stopped</h2>
      <p style="color:rgba(235,235,245,0.4);font-family:-apple-system,sans-serif;
                font-size:14px">You can close this tab.</p>
    </div>`;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
