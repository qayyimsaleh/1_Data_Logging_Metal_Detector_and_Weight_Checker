<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ title }} — Analytics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
<nav class="topnav">
  <div class="topnav-inner">
    <div class="tl-group">
      <span class="tl tl-red"    onclick="confirmShutdown()"></span>
      <span class="tl tl-yellow"></span>
      <span class="tl tl-green"></span>
    </div>
    <div class="brand">
      <div class="brand-name">{{ title }}</div>
      <div class="brand-sub">Production Analytics · v{{ version }}</div>
    </div>
    <div class="nav-segment">
      <a href="/"        class="nav-link {% if active=='dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/reports" class="nav-link {% if active=='reports'   %}active{% endif %}">Reports</a>
    </div>
    <span id="live-clock" style="font-size:12px;color:var(--text3);margin-left:4px"></span>
  </div>
</nav>
<div class="refresh-wrap"><div class="refresh-bar" id="refresh-bar" style="width:100%"></div></div>

<main class="main-content">
  {% block content %}{% endblock %}
</main>

<script>
(function clock() {
  const el = document.getElementById('live-clock');
  if (el) el.textContent = new Date().toLocaleTimeString('en-GB',
    {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  setTimeout(clock, 1000);
})();
async function confirmShutdown() {
  if (!confirm('Stop the analytics server?')) return;
  try { await fetch('/shutdown', {method:'POST'}); } catch(e) {}
  document.body.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#000;flex-direction:column;gap:12px">
      <div style="width:48px;height:48px;background:#FF5F57;border-radius:50%;box-shadow:0 0 24px rgba(255,95,87,.4)"></div>
      <h2 style="color:#fff;font-family:-apple-system,sans-serif;font-weight:700">Server Stopped</h2>
      <p style="color:rgba(235,235,245,0.4);font-family:-apple-system,sans-serif;font-size:13px">You can close this tab.</p>
    </div>`;
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
